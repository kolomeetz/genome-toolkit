enzymes:
  - symbol: CYP2D6
    drug_cards:
      - class: SSRIs (Fluoxetine, Paroxetine)
        drugs: "Fluoxetine (Prozac), Paroxetine (Paxil), Fluvoxamine"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Use alternative SSRI (sertraline, citalopram)", description: "These SSRIs are primarily metabolized by CYP2D6. Poor metabolizers may experience significantly elevated plasma levels and increased side effects." }
          intermediate: { impact: adjust, text: "Consider dose reduction or alternative", description: "Intermediate metabolism may lead to moderately elevated levels. Monitor for side effects and consider 25-50% dose reduction." }
          normal: { impact: ok, text: "Standard dosing appropriate", description: "Normal CYP2D6 metabolism. Standard SSRI dosing guidelines apply." }
          ultrarapid: { impact: adjust, text: "May need higher doses", description: "Ultrarapid metabolism may lead to subtherapeutic levels at standard doses." }
      - class: Opioid Prodrugs (Codeine, Tramadol)
        drugs: "Codeine, Tramadol, Hydrocodone"
        category: drug
        impact_by_status:
          poor: { impact: danger, text: "AVOID — prodrug conversion severely impaired", description: "CYP2D6 converts codeine to morphine. Poor metabolizers get almost no analgesic effect but still experience side effects.", danger_note: "Do NOT prescribe codeine or tramadol. Use alternative analgesics (morphine, oxycodone, non-opioid options)." }
          intermediate: { impact: warn, text: "Reduced efficacy — consider alternatives", description: "Reduced conversion to active metabolite. Pain relief may be inadequate at standard doses." }
          normal: { impact: ok, text: "Standard metabolism", description: "Normal prodrug activation. Standard dosing guidelines apply." }
          ultrarapid: { impact: danger, text: "DANGER — rapid conversion risk", description: "Ultrarapid conversion to morphine can cause respiratory depression.", danger_note: "Codeine is contraindicated. Use non-prodrug alternatives." }
      - class: Atomoxetine (ADHD)
        drugs: "Atomoxetine (Strattera)"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Start at lower dose", description: "Atomoxetine levels significantly elevated in poor metabolizers." }
          intermediate: { impact: adjust, text: "Monitor for elevated levels", description: "Moderately slower metabolism. Monitor for side effects." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism. Standard titration schedule." }
      - class: Recreational Substances
        drugs: "MDMA, Dextromethorphan (DXM)"
        category: substance
        impact_by_status:
          poor: { impact: danger, text: "Severely impaired clearance", description: "MDMA and DXM are CYP2D6 substrates. Poor metabolizers experience dramatically prolonged and intensified effects.", danger_note: "MDMA lasts much longer and redosing is extremely dangerous. DXM can reach serotonin-syndrome levels." }
          intermediate: { impact: warn, text: "Slower clearance — dose carefully", description: "Effects last longer than typical. Start with lower doses and extend intervals." }
          normal: { impact: ok, text: "Standard metabolism", description: "Normal clearance rates. Standard harm reduction applies." }
      - class: Beta Blockers (Metoprolol)
        drugs: "Metoprolol, Carvedilol, Timolol"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Use alternative beta blocker", description: "Significantly elevated metoprolol levels. Risk of bradycardia and hypotension." }
          intermediate: { impact: adjust, text: "Consider dose reduction", description: "Moderately elevated levels. Monitor heart rate and blood pressure." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism. Standard dosing guidelines." }
      - class: Antipsychotics (Risperidone, Haloperidol, Aripiprazole)
        drugs: "Risperidone (Risperdal), Haloperidol (Haldol), Aripiprazole (Abilify), Perphenazine"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Higher side effect risk at standard doses", description: "CYP2D6 is the primary metabolic pathway for several atypical and typical antipsychotics. Poor metabolizers accumulate elevated levels, increasing EPS, sedation, and metabolic side effects.", danger_note: "If prescribed any of these, mention CYP2D6 status. Signs levels are too high: muscle stiffness, restlessness (akathisia), tremor, excess sedation, weight gain. CPIC recommends lower starting doses. Aripiprazole in particular has clear CPIC dosing guidance." }
          intermediate: { impact: adjust, text: "Start low, titrate slowly", description: "Moderately slower clearance. Start at lower end of range and monitor for side effects." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism. Standard protocols apply." }
          ultrarapid: { impact: warn, text: "May underperform at standard doses", description: "Rapid clearance can lead to subtherapeutic levels. If symptoms aren't controlled, this is why — discuss dose increase or alternative antipsychotic." }
      - class: Tricyclic Antidepressants
        drugs: "Amitriptyline (Elavil), Nortriptyline (Pamelor), Imipramine, Desipramine, Doxepin"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Toxicity risk — use 50% dose or alternative", description: "TCAs have a narrow therapeutic window. CYP2D6 poor metabolizers reach toxic levels quickly, risking cardiac arrhythmias and anticholinergic side effects.", danger_note: "Still commonly prescribed for chronic pain, migraine prevention, and sleep — not just depression. CPIC recommends 50% dose reduction or alternative (e.g., different TCA with CYP2D6-independent clearance). Watch for dry mouth, urinary retention, fast heartbeat, confusion — these mean levels are too high." }
          intermediate: { impact: adjust, text: "Start at 75% of standard dose", description: "Moderately slower metabolism. Lower starting doses with careful titration." }
          normal: { impact: ok, text: "Standard dosing with monitoring", description: "Normal metabolism. Standard TCA protocols apply." }
          ultrarapid: { impact: warn, text: "May underperform at standard doses", description: "Rapid clearance reduces efficacy. CPIC recommends alternative antidepressant or higher dose with TDM." }
  - symbol: CYP3A4
    drug_cards:
      - class: Benzodiazepines
        drugs: "Alprazolam (Xanax), Midazolam, Triazolam"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Prolonged sedation risk", description: "CYP3A4 poor metabolizers clear benzodiazepines much more slowly." }
          normal: { impact: ok, text: "Standard metabolism", description: "Normal benzodiazepine clearance. Standard dosing." }
      - class: Statins
        drugs: "Atorvastatin (Lipitor), Simvastatin, Lovastatin"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Risk of myopathy — use rosuvastatin", description: "Elevated statin levels increase risk of muscle damage." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal statin metabolism." }
      - class: Calcium Channel Blockers
        drugs: "Amlodipine, Nifedipine, Felodipine"
        category: drug
        impact_by_status:
          poor: { impact: adjust, text: "Start at lower dose", description: "Slower metabolism may lead to hypotension." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism." }
      - class: Immunosuppressants
        drugs: "Tacrolimus, Cyclosporine, Sirolimus"
        category: drug
        impact_by_status:
          poor: { impact: danger, text: "Therapeutic drug monitoring required", description: "Dramatically elevated levels. Toxicity risk.", danger_note: "Mandatory TDM with dose adjustments based on blood levels." }
          normal: { impact: ok, text: "Standard monitoring", description: "Normal metabolism. Follow standard TDM protocols." }
      - class: Grapefruit (food-drug interaction)
        drugs: "Grapefruit, grapefruit juice, pomelo, Seville oranges"
        category: substance
        impact_by_status:
          normal: { impact: warn, text: "Can dramatically raise levels of CYP3A4 drugs", description: "Grapefruit contains furanocoumarins that irreversibly inhibit intestinal CYP3A4 for 24-72 hours. This is NOT about your genotype — it affects everyone. One glass of grapefruit juice can double or triple plasma levels of sensitive drugs like statins, some calcium channel blockers, certain benzodiazepines, and immunosuppressants.", danger_note: "If you take any CYP3A4 substrate (check the cards above — statins, CCBs, benzos, immunosuppressants), avoid grapefruit entirely. Separating by a few hours does NOT work — the effect lasts days. Safe citrus: regular oranges, lemons, limes, mandarins. Dangerous: grapefruit, pomelo, Seville oranges, some tangelos." }
          poor: { impact: warn, text: "Even more dramatic effects", description: "Combined with your already slower CYP3A4 metabolism, grapefruit can push levels into toxic range very quickly." }
      - class: Recreational Substances
        drugs: "Cocaine, Ketamine, GHB"
        category: substance
        impact_by_status:
          poor: { impact: warn, text: "Slower clearance for some substances", description: "Cocaine and ketamine partially rely on CYP3A4. Effects may be slightly prolonged." }
          normal: { impact: ok, text: "Standard metabolism", description: "Normal clearance. Standard harm reduction applies." }

  - symbol: CYP2C19
    guideline: CPIC
    description: "CYP2C19 handles PPIs, several SSRIs, clopidogrel, and some benzos. It's one of the most clinically actionable enzymes with clear CPIC guidelines."
    drug_cards:
      - class: SSRIs (Citalopram, Escitalopram, Sertraline)
        drugs: "Citalopram (Celexa), Escitalopram (Lexapro), Sertraline (Zoloft)"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Start low — these may hit harder", description: "Poor CYP2C19 metabolism leads to elevated plasma levels of these SSRIs. CPIC recommends 50% starting dose for citalopram/escitalopram.", danger_note: "Expect stronger side effects at standard doses — jitteriness, GI issues, sexual side effects. Start at half dose and titrate slowly. If a doctor prescribes a 'standard' dose, mention your CYP2C19 status." }
          intermediate: { impact: adjust, text: "Standard dose, watch side effects", description: "Moderately slower metabolism. Standard doses usually work but side effects may be more noticeable." }
          normal: { impact: ok, text: "Standard dosing works", description: "Normal metabolism. Standard SSRI protocols apply." }
          ultrarapid: { impact: warn, text: "Standard doses may underperform", description: "Rapid clearance may lead to subtherapeutic levels. If an SSRI feels like it's 'not working' at standard doses, this is why.", danger_note: "Don't assume the drug doesn't work for you — your metabolism is clearing it faster than average. Discuss higher doses or alternative SSRIs (fluoxetine uses different pathway)." }
      - class: Clopidogrel (Plavix)
        drugs: "Clopidogrel (Plavix)"
        category: drug
        impact_by_status:
          poor: { impact: danger, text: "AVOID — no antiplatelet protection", description: "Clopidogrel is a prodrug activated by CYP2C19. Poor metabolizers get little to no antiplatelet effect, leaving them at risk for stroke/heart attack after stent placement.", danger_note: "If a cardiologist prescribes Plavix after a stent or stroke — SPEAK UP. This is life-critical. Ask about prasugrel or ticagrelor, which don't depend on CYP2C19." }
          intermediate: { impact: warn, text: "Reduced protection — discuss alternatives", description: "Partial prodrug activation. Antiplatelet effect is weaker than normal." }
          normal: { impact: ok, text: "Standard activation", description: "Normal prodrug conversion. Standard dosing protects as expected." }
          ultrarapid: { impact: ok, text: "Strong activation", description: "Efficient conversion to active metabolite. Standard dosing." }
      - class: Proton Pump Inhibitors
        drugs: "Omeprazole (Prilosec), Esomeprazole (Nexium), Lansoprazole (Prevacid), Pantoprazole"
        category: drug
        impact_by_status:
          poor: { impact: adjust, text: "Stronger acid suppression at standard doses", description: "PPIs accumulate in poor metabolizers, giving stronger and longer acid suppression. Usually fine short-term, but consider lower doses for chronic use.", danger_note: "For long-term GERD: a lower dose may work just as well for you. Long PPI courses at high doses carry risks (B12 deficiency, bone density, C. diff) — your genetics mean you need less." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism. Standard PPI protocols." }
          ultrarapid: { impact: warn, text: "PPIs may underperform for H. pylori", description: "Rapid clearance can reduce effectiveness for H. pylori eradication. Discuss higher doses or alternative regimens." }
      - class: Psychedelics (Psilocybin context)
        drugs: "Psilocybin, LSD (minor pathway)"
        category: substance
        impact_by_status:
          poor: { impact: adjust, text: "Slightly prolonged effects possible", description: "CYP2C19 plays a secondary role in psilocybin metabolism. Effects may last a bit longer than typical." }
          normal: { impact: ok, text: "Standard metabolism", description: "Normal clearance. Standard harm reduction applies." }

  - symbol: CYP2C9
    guideline: CPIC
    description: "CYP2C9 metabolizes warfarin, many NSAIDs, and some anticonvulsants. It's also involved in THC clearance — relevant for cannabis users."
    drug_cards:
      - class: Warfarin (Coumadin)
        drugs: "Warfarin (Coumadin)"
        category: drug
        impact_by_status:
          poor: { impact: danger, text: "Much lower starting dose required", description: "Warfarin is primarily cleared by CYP2C9. Poor metabolizers need significantly lower doses (sometimes 50-70% lower) to avoid bleeding.", danger_note: "If prescribed warfarin, this MUST be on your chart. Standard starting doses can cause dangerous bleeding. Also check your VKORC1 status — that's the other half of warfarin dosing. Mention both to your prescriber." }
          intermediate: { impact: warn, text: "Reduced starting dose recommended", description: "Moderately slower clearance. CPIC recommends lower initial doses with careful INR monitoring." }
          normal: { impact: ok, text: "Standard dosing protocols", description: "Normal metabolism. Standard warfarin initiation and INR monitoring." }
      - class: NSAIDs (Ibuprofen, Celecoxib, Naproxen)
        drugs: "Ibuprofen (Advil), Celecoxib (Celebrex), Naproxen (Aleve), Meloxicam"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Higher GI bleeding and kidney risk", description: "Poor metabolizers clear NSAIDs slowly, increasing plasma levels and risk of GI bleeding, kidney stress, and cardiovascular events.", danger_note: "For occasional use (headache, sore muscle), use the lowest effective dose and keep courses short. Avoid chronic daily NSAIDs. Consider acetaminophen (different pathway) or topical NSAIDs for localized pain." }
          intermediate: { impact: adjust, text: "Standard dose, limit duration", description: "Moderately slower clearance. Fine for occasional use; avoid chronic high-dose regimens." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism. Standard NSAID use." }
      - class: Phenytoin (Dilantin)
        drugs: "Phenytoin (Dilantin)"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Toxicity risk at standard doses", description: "Phenytoin has a narrow therapeutic window. Poor metabolizers reach toxic levels quickly. CPIC recommends 25-50% dose reduction." }
          normal: { impact: ok, text: "Standard dosing with TDM", description: "Normal metabolism. Standard initiation with therapeutic drug monitoring." }
      - class: Cannabis (THC)
        drugs: "THC (smoked, edibles, vaped)"
        category: substance
        impact_by_status:
          poor: { impact: warn, text: "Stronger and longer effects than average", description: "CYP2C9 is a major pathway for THC clearance. Poor metabolizers experience significantly more intense and longer-lasting effects, especially from edibles.", danger_note: "Edibles will hit you harder and last longer — sometimes 8-12 hours instead of 4-6. Start with half the 'standard' dose (2.5mg THC, not 5-10mg) and wait at least 2 hours before redosing. Smoking/vaping is more predictable than edibles for you." }
          intermediate: { impact: adjust, text: "Effects may last longer than typical", description: "Moderately slower THC clearance. Edibles especially may outlast expectations." }
          normal: { impact: ok, text: "Standard metabolism", description: "Normal clearance. Standard harm reduction applies." }

  - symbol: CYP2B6
    guideline: CPIC
    description: "CYP2B6 metabolizes bupropion, methadone, efavirenz, and ketamine. Variable between individuals and highly relevant for both psychiatry and substance use."
    drug_cards:
      - class: Bupropion (Wellbutrin, Zyban)
        drugs: "Bupropion (Wellbutrin, Zyban)"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Elevated levels — seizure risk", description: "Bupropion has a dose-dependent seizure risk. Poor metabolizers accumulate higher plasma levels, increasing risk.", danger_note: "If prescribed Wellbutrin for depression or Zyban for smoking cessation, start at the lowest dose (100mg SR, not XL 150). Watch for signs of overstimulation — insomnia, agitation, tremor — these mean levels are too high." }
          intermediate: { impact: adjust, text: "Standard dose, monitor for overstimulation", description: "Moderately slower clearance. Start lower and titrate carefully." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism. Standard bupropion protocols." }
          ultrarapid: { impact: warn, text: "May underperform at standard doses", description: "Rapid clearance can reduce efficacy. If bupropion feels like 'nothing', this is why." }
      - class: Methadone
        drugs: "Methadone (for OUD or chronic pain)"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "Accumulation and QT prolongation risk", description: "Poor CYP2B6 metabolism can lead to methadone accumulation, respiratory depression, and cardiac QT prolongation.", danger_note: "If you're on methadone maintenance, your clinic should know your status. Accumulation happens gradually over days — signs include excess sedation, slowed breathing, or feeling 'too high' on a stable dose." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism. Standard methadone protocols." }
      - class: Efavirenz (HIV)
        drugs: "Efavirenz (Sustiva, part of Atripla)"
        category: drug
        impact_by_status:
          poor: { impact: warn, text: "CNS side effects more likely", description: "CPIC recommends dose reduction for CYP2B6 poor metabolizers on efavirenz due to elevated levels and CNS toxicity (vivid dreams, dizziness, depression)." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism." }
      - class: Ketamine (therapeutic and recreational)
        drugs: "Ketamine (IV, IM, nasal, recreational)"
        category: substance
        impact_by_status:
          poor: { impact: warn, text: "Longer and deeper effects", description: "CYP2B6 is a major ketamine pathway. Poor metabolizers experience longer dissociative effects and slower return to baseline.", danger_note: "Whether therapeutic (for depression) or recreational, expect longer trips than peers report. Space doses further apart. Never combine with alcohol, GHB, or benzos — respiratory depression risk compounds. Stay hydrated; ketamine is hard on the bladder for frequent users." }
          intermediate: { impact: adjust, text: "Slightly prolonged effects", description: "Moderately slower clearance. Effects may outlast typical reports." }
          normal: { impact: ok, text: "Standard metabolism", description: "Normal clearance. Standard harm reduction applies." }

  - symbol: CYP2E1
    description: "CYP2E1 handles alcohol (secondary to ADH/ALDH2), acetaminophen, and volatile anesthetics. Inducible by chronic alcohol use — chronic drinkers have upregulated CYP2E1."
    drug_cards:
      - class: Acetaminophen (Tylenol, Paracetamol)
        drugs: "Acetaminophen (Tylenol), combo products (Percocet, Vicodin, NyQuil)"
        category: drug
        impact_by_status:
          ultrarapid: { impact: warn, text: "Higher liver toxicity risk", description: "CYP2E1 converts a fraction of acetaminophen into NAPQI, a toxic liver metabolite. Ultrarapid metabolism produces more NAPQI per dose.", danger_note: "Stay well under the 4g/day ceiling — aim for <3g on any day you take it. NEVER combine with alcohol (also induces CYP2E1 — effects stack). Watch combo products: NyQuil, Percocet, Vicodin all contain acetaminophen and it adds up fast." }
          normal: { impact: ok, text: "Standard dosing", description: "Normal metabolism. Standard dosing (max 4g/day, lower with alcohol use)." }
          poor: { impact: ok, text: "Standard dosing", description: "Slower NAPQI formation. Standard protocols apply." }
      - class: Volatile Anesthetics
        drugs: "Isoflurane, Sevoflurane, Halothane"
        category: drug
        impact_by_status:
          ultrarapid: { impact: adjust, text: "Faster metabolism — mention pre-surgery", description: "Ultrarapid CYP2E1 metabolism affects volatile anesthetic clearance. Usually managed by anesthesiologist in real-time but worth mentioning." }
          normal: { impact: ok, text: "Standard anesthesia", description: "Normal metabolism." }
      - class: Alcohol (chronic use)
        drugs: "Ethanol (beer, wine, spirits)"
        category: substance
        impact_by_status:
          ultrarapid: { impact: warn, text: "Faster tolerance + higher ALD risk long-term", description: "CYP2E1 is the secondary alcohol pathway (main one is ADH). Ultrarapid CYP2E1 metabolism generates more reactive oxygen species during alcohol breakdown, increasing long-term liver damage risk.", danger_note: "Short-term: you may feel 'less drunk' per drink than peers — this isn't protection, it's a faster path to tolerance and dependence. Long-term: higher risk of fatty liver and hepatitis at the same drinking level as friends. Alcohol-free days matter more for you than they do for an average person." }
          normal: { impact: ok, text: "Standard metabolism", description: "Normal CYP2E1. ADH/ALDH2 status is more relevant for alcohol — check those genes." }

  - symbol: SLCO1B1
    guideline: CPIC
    description: "SLCO1B1 is a liver transporter, not a CYP enzyme. It pumps statins into liver cells where they work. Decreased function means statins accumulate in muscle instead — the primary cause of statin-induced muscle pain and myopathy."
    drug_cards:
      - class: Statins (Simvastatin, Atorvastatin, Rosuvastatin)
        drugs: "Simvastatin (Zocor), Atorvastatin (Lipitor), Rosuvastatin (Crestor), Pravastatin"
        category: drug
        impact_by_status:
          poor: { impact: danger, text: "High myopathy risk — avoid simvastatin", description: "Decreased SLCO1B1 function means statins stay in muscle tissue instead of being delivered to liver. Simvastatin at 80mg carries ~18% myopathy risk in poor function carriers vs ~0.6% in normal function. CPIC strongly recommends alternative statins or lower doses.", danger_note: "If a doctor prescribes simvastatin, REQUEST an alternative. Rosuvastatin and pravastatin are much safer for you. Watch for muscle pain, weakness, dark urine — these mean the statin is damaging muscle (rhabdomyolysis). Don't just tough it out — statin myopathy can progress quickly. Most people with SLCO1B1 issues can still take statins safely on alternatives at moderate doses." }
          intermediate: { impact: warn, text: "Lower doses or alternative statin recommended", description: "Moderately decreased transport. CPIC recommends avoiding high-dose simvastatin; lower-intensity alternatives are safer." }
          normal: { impact: ok, text: "Standard statin dosing", description: "Normal transporter function. Standard statin protocols apply — muscle pain is still possible but not elevated above baseline population risk." }
