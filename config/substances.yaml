substances:
  - name: Alcohol
    relevant_genes: [ALDH2, ADH1B, GABRA2, GAD1]
    relevant_enzymes: [CYP2E1]
    harm_title: Harm reduction
    harm_text: "Track your drinks — your subjective threshold may be lower than peers'. Avoid combining with benzodiazepines or GHB (compounding GABA effects)."
  - name: MDMA / Ecstasy
    relevant_genes: [CYP2D6, DRD2, COMT, SLC6A4]
    relevant_enzymes: [CYP2D6]
    harm_title: Harm reduction
    harm_text: "Start with lower doses than typical recommendations (your metabolism is slower). Wait at least 3 hours before considering redose. Avoid if on SSRIs."
  - name: Cocaine
    relevant_genes: [CYP3A4, CYP2D6, DRD2, COMT]
    relevant_enzymes: [CYP3A4, CYP2D6]
    harm_title: Harm reduction
    harm_text: "Do not combine with MDMA or use while on SSRIs. Be aware of your reward sensitivity (DRD2). Set limits before using, not during."
  - name: Psychedelics (Psilocybin, LSD)
    relevant_genes: [CYP3A4, CYP2D6, MAOA]
    relevant_enzymes: [CYP3A4, CYP2D6]
    harm_title: Harm reduction
    harm_text: "For psilocybin: start with lower doses given slightly slower CYP2D6 metabolism. For DMT/ayahuasca: MAO-A status means monoamine clearance is already reduced — use extreme caution with MAOIs."
  - name: Ketamine
    relevant_genes: [CYP3A4, CYP2B6, BDNF]
    relevant_enzymes: [CYP3A4, CYP2B6]
    harm_title: Harm reduction
    harm_text: "Standard metabolism means predictable clearance. Do not combine with alcohol or benzodiazepines. BDNF Val/Val may mean better response to therapeutic ketamine."
  - name: Cannabis
    relevant_genes: [CYP2C9, CYP3A4, COMT]
    relevant_enzymes: [CYP2C9, CYP3A4]
    harm_title: Harm reduction
    harm_text: "With slow COMT, high-THC strains may increase anxiety. Consider balanced THC:CBD ratios. If taking benzodiazepines, CBD can slow their metabolism."
  - name: Benzodiazepines (Xanax, Klonopin)
    relevant_genes: [CYP3A4, GABRA2, GAD1]
    relevant_enzymes: [CYP3A4]
    harm_title: Harm reduction
    harm_text: "Your genetic profile suggests higher-than-average benzodiazepine sensitivity and faster dependence development. Never combine with alcohol or opioids. Taper slowly if stopping."
