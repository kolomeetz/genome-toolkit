<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340"
     width="800" height="340"
     font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Consolas', monospace">
  <style>
    .title { font-size: 18px; fill: #1A202C; font-weight: bold; }
    .subtitle { font-size: 14px; fill: #1A202C; font-weight: bold; }
    .stat-label { font-size: 12px; fill: #718096; }
    .stat-value { font-size: 20px; fill: #1A202C; font-weight: bold; }
    .item-text { font-size: 12px; fill: #1A202C; }
    .item-score { font-size: 12px; font-weight: bold; }
  </style>

  <rect width="800" height="340" fill="#FFFFFF" />

  <text x="20" y="32" class="title">Triage Dashboard</text>

  <!-- Bucket distribution -->
  <text x="20" y="68" class="subtitle">Bucket Distribution</text>
  
  <rect x="20" y="78" width="200.0" height="24" fill="#E53E3E" rx="3" />
  <text x="20" y="120" class="stat-label">Do Now</text>
  <text x="20" y="138" class="stat-value">2</text>
  
  <rect x="228.0" y="78" width="100.0" height="24" fill="#DD6B20" rx="3" />
  <text x="228.0" y="120" class="stat-label">This Week</text>
  <text x="228.0" y="138" class="stat-value">1</text>
  
  <rect x="336.0" y="78" width="100.0" height="24" fill="#718096" rx="3" />
  <text x="336.0" y="120" class="stat-label">Backlog</text>
  <text x="336.0" y="138" class="stat-value">1</text>
  
  <rect x="444.0" y="78" width="100.0" height="24" fill="#A0AEC0" rx="3" />
  <text x="444.0" y="120" class="stat-label">Consider Dropping</text>
  <text x="444.0" y="138" class="stat-value">1</text>
  

  <!-- Suggestions count -->
  <text x="600" y="120" class="stat-label">Suggestions</text>
  <text x="600" y="138" class="stat-value">2</text>

  <!-- Top items -->
  <text x="20" y="172" class="subtitle">Top Items</text>
  
  <rect x="20" y="190" width="8" height="18" fill="#E53E3E" rx="2" />
  <text x="36" y="204" class="item-text">Request CRP blood test</text>
  <text x="740" y="204" class="item-score" fill="#E53E3E">82</text>
  
  <rect x="20" y="216" width="8" height="18" fill="#E53E3E" rx="2" />
  <text x="36" y="230" class="item-text">Discuss nortriptyline with prescriber</text>
  <text x="740" y="230" class="item-score" fill="#E53E3E">71</text>
  
  <rect x="20" y="242" width="8" height="18" fill="#DD6B20" rx="2" />
  <text x="36" y="256" class="item-text">Schedule HLA-B27 follow-up</text>
  <text x="740" y="256" class="item-score" fill="#DD6B20">55</text>
  
  <rect x="20" y="268" width="8" height="18" fill="#718096" rx="2" />
  <text x="36" y="282" class="item-text">Update FADS1 gene note with new GWAS data</text>
  <text x="740" y="282" class="item-score" fill="#718096">38</text>
  
  <rect x="20" y="294" width="8" height="18" fill="#A0AEC0" rx="2" />
  <text x="36" y="308" class="item-text">Check telomere PRS literature</text>
  <text x="740" y="308" class="item-score" fill="#A0AEC0">22</text>
  
</svg>